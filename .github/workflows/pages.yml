name: Deploy docs to GitHub Pages

# Publishes the docsify site in docs/ to GitHub Pages on every push to the
# default branch. The site is static (docsify renders Markdown in the browser),
# so no build step is required — we upload docs/ as-is.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# Allow only one concurrent deployment; skip runs queued behind an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement: true lets the workflow turn on GitHub Pages (build type
        # "GitHub Actions") on first run, so no manual Settings toggle is needed.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
