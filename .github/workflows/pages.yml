name: Deploy site to GitHub Pages

# Publishes the docsify site to GitHub Pages. The site is served from the
# REPOSITORY ROOT (index.html at root) so that every repo-relative link — docs/,
# patterns/, catalog/, field-notes/, and the root project guides — resolves as an
# in-site route. The site is static (docsify renders Markdown in the browser), so
# there is no build step; we just stage the repo (minus VCS/CI internals) and
# upload it.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow only one concurrent deployment; skip runs queued behind an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement: true lets the workflow turn on GitHub Pages (build type
        # "GitHub Actions") on first run, so no manual Settings toggle is needed.
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Assemble site from repo root (minus VCS/CI internals)
        run: |
          mkdir -p _site
          rsync -a --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='_site' \
            ./ _site/

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
