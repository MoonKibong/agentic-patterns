<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Agentic Patterns</title>
  <meta name="description" content="A pattern language for human-guided AI work." />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    /* Language switcher (fixed, top-right) */
    .lang-switch {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.92);
      border-bottom-left-radius: 6px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
      padding: 6px 10px;
      font-size: 13px;
    }
    .lang-switch a {
      margin: 0 4px;
      text-decoration: none;
      color: #42b983;
    }
    .lang-switch a.active {
      font-weight: 700;
      text-decoration: underline;
    }
    @media (max-width: 600px) {
      .lang-switch { font-size: 11px; padding: 4px 6px; }
    }
  </style>
</head>
<body>
  <nav class="lang-switch" aria-label="Language">
    <a href="#/" data-lang="en">EN</a>
    <a href="#/i18n/ko/" data-lang="ko">한국어</a>
    <a href="#/i18n/ja/" data-lang="ja">日本語</a>
    <a href="#/i18n/zh/" data-lang="zh">简体中文</a>
    <a href="#/i18n/es/" data-lang="es">Español</a>
    <a href="#/i18n/fr/" data-lang="fr">Français</a>
  </nav>
  <div id="app">Loading the Agentic Patterns wiki…</div>
  <script>
    // Repo-root artifacts intentionally live OUTSIDE the served docs/ root
    // (catalog/, patterns/, field-notes/, and root project guides). Docsify would
    // otherwise try to load them as in-site routes and 404, so we rewrite those
    // links to absolute GitHub URLs. Localized pages keep same-locale relative
    // links, which docsify resolves normally.
    var GH_BASE = 'https://github.com/MoonKibong/agentic-patterns/blob/main/';
    var EXTERNAL_PREFIXES = ['catalog', 'patterns', 'field-notes', 'CONTRIBUTING', 'AGENTS'];

    function externalArtifactPlugin(hook, vm) {
      hook.doneEach(function () {
        var links = document.querySelectorAll('#app a[href^="#/"]');
        links.forEach(function (a) {
          var href = a.getAttribute('href') || '';
          var path = href.replace(/^#\//, '');
          var first = path.split('/')[0];
          if (EXTERNAL_PREFIXES.indexOf(first) === -1) return;
          // Strip any trailing docsify anchor/query, then map to a real repo path.
          var clean = path.split(/[?#]/)[0];
          if (clean === '' || /\/$/.test(clean)) {
            clean = clean.replace(/\/$/, '') + '/README.md';
          } else if (!/\.[a-z0-9]+$/i.test(clean)) {
            clean += '.md';
          }
          a.setAttribute('href', GH_BASE + clean);
          a.setAttribute('target', '_blank');
          a.setAttribute('rel', 'noopener');
        });
      });
    }

    // Highlight the active language in the switcher based on the current route.
    function langSwitchPlugin(hook, vm) {
      hook.doneEach(function () {
        var path = (vm.route && vm.route.path) || '/';
        var current = 'en';
        var m = path.match(/^\/i18n\/([a-z]{2})\//);
        if (m) current = m[1];
        document.querySelectorAll('.lang-switch a').forEach(function (a) {
          a.classList.toggle('active', a.getAttribute('data-lang') === current);
        });
      });
    }

    window.$docsify = {
      name: 'Agentic Patterns',
      repo: 'MoonKibong/agentic-patterns',
      homepage: 'README.md',
      loadSidebar: '_sidebar.md',
      // Each locale directory ships its own _sidebar.md. The locale-root sidebars
      // load directly; these aliases make nested pages (categories/, domains/, …)
      // fall back to their own locale sidebar, and English nested pages to the
      // root sidebar. Order matters: locale rules are matched before the catch-all.
      alias: {
        '/i18n/ko/(.*)/_sidebar.md': '/i18n/ko/_sidebar.md',
        '/i18n/ja/(.*)/_sidebar.md': '/i18n/ja/_sidebar.md',
        '/i18n/zh/(.*)/_sidebar.md': '/i18n/zh/_sidebar.md',
        '/i18n/es/(.*)/_sidebar.md': '/i18n/es/_sidebar.md',
        '/i18n/fr/(.*)/_sidebar.md': '/i18n/fr/_sidebar.md',
        '/.*/_sidebar.md': '/_sidebar.md'
      },
      // Defense in depth: if any localized page were ever missing, fall back to the
      // English source. The mirrors are complete, so this should not trigger.
      fallbackLanguages: ['ko', 'ja', 'zh', 'es', 'fr'],
      subMaxLevel: 2,
      auto2top: true,
      relativePath: true,
      externalLinkTarget: '_blank',
      notFoundPage: true,
      plugins: [externalArtifactPlugin, langSwitchPlugin]
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
</body>
</html>
