<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Agentic Patterns</title>
  <meta name="description" content="A pattern language for human-guided AI work." />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0" />
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css" />
  <style>
    /* Language switcher (fixed, top-right) */
    .lang-switch {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 100;
      background: rgba(255, 255, 255, 0.92);
      border-bottom-left-radius: 6px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.12);
      padding: 6px 10px;
      font-size: 13px;
    }
    .lang-switch a {
      margin: 0 4px;
      text-decoration: none;
      color: #42b983;
    }
    .lang-switch a.active {
      font-weight: 700;
      text-decoration: underline;
    }
    @media (max-width: 600px) {
      .lang-switch { font-size: 11px; padding: 4px 6px; }
    }
  </style>
</head>
<body>
  <nav class="lang-switch" aria-label="Language">
    <a href="#/docs/" data-lang="en">EN</a>
    <a href="#/docs/i18n/ko/" data-lang="ko">한국어</a>
    <a href="#/docs/i18n/ja/" data-lang="ja">日本語</a>
    <a href="#/docs/i18n/zh/" data-lang="zh">简体中文</a>
    <a href="#/docs/i18n/es/" data-lang="es">Español</a>
    <a href="#/docs/i18n/fr/" data-lang="fr">Français</a>
  </nav>
  <div id="app">Loading the Agentic Patterns wiki…</div>
  <script>
    // The site is served from the REPOSITORY ROOT, so every repo-relative link
    // (docs/, patterns/, catalog/, field-notes/, root guides) resolves as an
    // in-site docsify route. No link rewriting or GitHub redirect is needed.

    // Highlight the active language in the switcher based on the current route.
    function langSwitchPlugin(hook, vm) {
      hook.doneEach(function () {
        var path = (vm.route && vm.route.path) || '/';
        var current = 'en';
        var m = path.match(/^\/docs\/i18n\/([a-z]{2})(\/|$)/);
        if (m) current = m[1];
        document.querySelectorAll('.lang-switch a').forEach(function (a) {
          a.classList.toggle('active', a.getAttribute('data-lang') === current);
        });
      });
    }

    window.$docsify = {
      name: 'Agentic Patterns',
      repo: 'MoonKibong/agentic-patterns',
      // Landing page = the project README at the repo root; the wiki home is one
      // click away at #/docs/ (its links are all repo-root relative, so they work).
      homepage: 'README.md',
      loadSidebar: '_sidebar.md',
      // Sidebars use absolute route paths, so one sidebar renders correctly on
      // pages at any depth. Each locale ships its own sidebar; everything else
      // (repo README, docs pages, patterns, catalog, field-notes) uses the
      // English docs sidebar. Locale rules are matched before the catch-all.
      alias: {
        '/docs/i18n/ko/(.*)_sidebar.md': '/docs/i18n/ko/_sidebar.md',
        '/docs/i18n/ja/(.*)_sidebar.md': '/docs/i18n/ja/_sidebar.md',
        '/docs/i18n/zh/(.*)_sidebar.md': '/docs/i18n/zh/_sidebar.md',
        '/docs/i18n/es/(.*)_sidebar.md': '/docs/i18n/es/_sidebar.md',
        '/docs/i18n/fr/(.*)_sidebar.md': '/docs/i18n/fr/_sidebar.md',
        '/(.*)_sidebar.md': '/docs/_sidebar.md'
      },
      subMaxLevel: 2,
      auto2top: true,
      relativePath: true,
      externalLinkTarget: '_blank',
      notFoundPage: true,
      plugins: [langSwitchPlugin]
    };
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-bash.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-yaml.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/prismjs@1/components/prism-markdown.min.js"></script>
</body>
</html>
